<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Background -->
  <rect width="240" height="60" rx="8" fill="#0f172a"/>
  <!-- GPU chip icon (left) -->
  <rect x="10" y="10" width="40" height="40" rx="4" fill="#0f172a"/>
  <!-- Chip body -->
  <rect x="16" y="16" width="28" height="28" rx="3" fill="#1e293b" stroke="#76b900" stroke-width="1.5"/>
  <!-- Chip grid -->
  <rect x="20" y="20" width="6" height="6" rx="1" fill="#76b900" opacity="0.9"/>
  <rect x="28" y="20" width="6" height="6" rx="1" fill="#76b900" opacity="0.6"/>
  <rect x="36" y="20" width="4" height="6" rx="1" fill="#76b900" opacity="0.4"/>
  <rect x="20" y="28" width="6" height="6" rx="1" fill="#76b900" opacity="0.6"/>
  <rect x="28" y="28" width="6" height="6" rx="1" fill="#76b900"/>
  <rect x="36" y="28" width="4" height="6" rx="1" fill="#76b900" opacity="0.6"/>
  <rect x="20" y="36" width="6" height="4" rx="1" fill="#76b900" opacity="0.4"/>
  <rect x="28" y="36" width="6" height="4" rx="1" fill="#76b900" opacity="0.6"/>
  <rect x="36" y="36" width="4" height="4" rx="1" fill="#76b900" opacity="0.9"/>
  <!-- Pins top -->
  <rect x="19" y="11" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="24" y="11" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="29" y="11" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="34" y="11" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Pins bottom -->
  <rect x="19" y="44" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="24" y="44" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="29" y="44" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="34" y="44" width="2" height="5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Pins left -->
  <rect x="11" y="19" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="11" y="24" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="11" y="29" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="11" y="34" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Pins right -->
  <rect x="44" y="19" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="44" y="24" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="44" y="29" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="44" y="34" width="5" height="2" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Text: vGPU -->
  <text x="62" y="26" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" fill="#76b900">vGPU</text>
  <!-- Text: Advisor -->
  <text x="62" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="400" fill="#94a3b8">Advisor</text>
  <!-- Divider line -->
  <line x1="130" y1="14" x2="130" y2="46" stroke="#334155" stroke-width="1"/>
  <!-- Tagline -->
  <text x="140" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#64748b">NVIDIA vGPU Profile</text>
  <text x="140" y="42" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#64748b">Density Calculator</text>
</svg>
