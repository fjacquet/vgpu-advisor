<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- GPU chip body -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="#1e293b" stroke="#76b900" stroke-width="1"/>
  <!-- Chip grid pattern -->
  <rect x="11" y="11" width="3" height="3" rx="0.5" fill="#76b900" opacity="0.9"/>
  <rect x="15" y="11" width="3" height="3" rx="0.5" fill="#76b900" opacity="0.6"/>
  <rect x="19" y="11" width="2" height="3" rx="0.5" fill="#76b900" opacity="0.4"/>
  <rect x="11" y="15" width="3" height="3" rx="0.5" fill="#76b900" opacity="0.6"/>
  <rect x="15" y="15" width="3" height="3" rx="0.5" fill="#76b900" opacity="1"/>
  <rect x="19" y="15" width="2" height="3" rx="0.5" fill="#76b900" opacity="0.6"/>
  <rect x="11" y="19" width="3" height="2" rx="0.5" fill="#76b900" opacity="0.4"/>
  <rect x="15" y="19" width="3" height="2" rx="0.5" fill="#76b900" opacity="0.6"/>
  <rect x="19" y="19" width="2" height="2" rx="0.5" fill="#76b900" opacity="0.9"/>
  <!-- Memory pins top -->
  <rect x="10" y="5" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="13" y="5" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="16" y="5" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="19" y="5" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Memory pins bottom -->
  <rect x="10" y="24" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="13" y="24" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="16" y="24" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="19" y="24" width="1.5" height="3" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Memory pins left -->
  <rect x="5" y="10" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="5" y="13" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="5" y="16" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="5" y="19" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <!-- Memory pins right -->
  <rect x="24" y="10" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="24" y="13" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="24" y="16" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
  <rect x="24" y="19" width="3" height="1.5" rx="0.5" fill="#76b900" opacity="0.7"/>
</svg>
